# Network reproduction harness for the get.dune.build connectivity failures.
#
# Background: a small fraction (~10-20%) of GitHub-hosted runners cannot open a
# TCP connection to get.dune.build (128.232.124.216:443). The SYNs never reach
# Cambridge — the failure is tied to the runner's Azure *egress* IP, not the
# server. This workflow fans out many independent runners, each probing
# get.dune.build with a SHORT connect timeout (so a wedged runner fails in
# seconds instead of the ~22 min the 10x/135s retry loop took), records the
# runner's public egress IP, and aggregates which egress IPs failed.
#
# Run it from the Actions tab ("Run workflow") or:
#   gh workflow run stress-network.yml -R mtelvers/setup-dune \
#     -f count=60 -f connect_timeout=10 -f attempts=3

name: Network stress (get.dune.build)

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Number of parallel probe runners"
        default: "60"
      connect_timeout:
        description: "curl --connect-timeout (seconds) per attempt"
        default: "10"
      attempts:
        description: "Connection attempts per runner"
        default: "3"
      host:
        description: "Target URL to probe"
        default: "https://get.dune.build/install"

permissions:
  contents: read

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        run: |
          n="${{ inputs.count }}"
          echo "matrix=$(seq 1 "$n" | jq -R . | jq -cs .)" >> "$GITHUB_OUTPUT"

  probe:
    needs: prep
    name: probe ${{ matrix.i }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 256
      matrix:
        i: ${{ fromJson(needs.prep.outputs.matrix) }}
    env:
      CT: ${{ inputs.connect_timeout }}
      ATTEMPTS: ${{ inputs.attempts }}
      URL: ${{ inputs.host }}
    steps:
      - name: Probe targets
        run: |
          set -u
          mkdir -p out

          # Public egress IPv4 of this runner (the value to correlate failures against)
          EGRESS=$(curl -4 -s --max-time 10 https://api.ipify.org || true)
          [ -z "$EGRESS" ] && EGRESS=$(curl -4 -s --max-time 10 https://ifconfig.me || true)
          [ -z "$EGRESS" ] && EGRESS=unknown
          echo "Runner egress IPv4: $EGRESS"

          # Does this runner even have IPv6 egress?
          EGRESS6=$(curl -6 -s --max-time 8 https://api6.ipify.org 2>/dev/null || true)
          [ -z "$EGRESS6" ] && EGRESS6=none
          echo "Runner egress IPv6: $EGRESS6"

          # TCP-connect probe; classifies reachability of a target independent of TLS/HTTP.
          #   rc=28              -> BLOCKED   (connect timed out = SYN black-holed mid-path)
          #   tc>0               -> reached   (TCP handshake completed)
          #   rc=7 (v4, fast)    -> reached   (connection refused / RST = host answered)
          #   rc=6/7 (v6, no tc) -> NOV6      (no IPv6 route from this runner)
          probe() {
            local fam=$1 label=$2 url=$3 tc rc cls
            tc=$(curl -"$fam" -sS -o /dev/null --connect-timeout "$CT" --max-time 25 -w '%{time_connect}' "$url" 2>/dev/null); rc=$?
            if [ "$rc" = 28 ]; then cls=BLOCKED
            elif [ -n "$tc" ] && [ "$tc" != "0.000000" ]; then cls=reached
            elif [ "$fam" = 6 ] && { [ "$rc" = 6 ] || [ "$rc" = 7 ]; }; then cls=NOV6
            elif [ "$rc" = 7 ]; then cls=reached
            else cls="rc$rc"; fi
            echo "${label}:${cls}(rc${rc},tc${tc:-0})"
          }

          # IPv4: dune + an independent Cambridge host (mint, same border) + non-Cambridge controls
          DUNE=$(probe 4 dune   "$URL")
          CAM=$(probe  4 cam    "https://128.232.124.158/")
          GH=$(probe   4 github "https://github.com")
          CF=$(probe   4 cf     "https://1.1.1.1")
          EU=$(probe   4 eu     "https://european-union.europa.eu")
          # IPv6: dune over v6 + non-Cambridge v6 controls (Cloudflare, EU) to tell "no v6" from "Cambridge-blocked"
          DUNE6=$(probe 6 dune6 "$URL")
          CF6=$(probe   6 cf6   "https://[2606:4700:4700::1111]")
          EU6=$(probe   6 eu6   "https://european-union.europa.eu")
          echo "v4: $DUNE $CAM $GH $CF $EU"
          echo "v6: $DUNE6 $CF6 $EU6"

          status=ok; case "$DUNE" in dune:reached*) ;; *) status=FAIL;; esac
          echo "RESULT i=${{ matrix.i }} egress=$EGRESS egress6=$EGRESS6 status=$status $DUNE $CAM $GH $CF $EU $DUNE6 $CF6 $EU6" \
            | tee "out/result-${{ matrix.i }}.txt"

          {
            echo "- probe ${{ matrix.i }}: v4 \`$EGRESS\` / v6 \`$EGRESS6\` — $DUNE $CAM $GH $CF $EU $DUNE6 $CF6 $EU6 **$status**"
          } >> "$GITHUB_STEP_SUMMARY"

          # Red if dune was blocked over IPv4, so failures stand out in the matrix.
          case "$DUNE" in dune:reached*) true;; *) false;; esac

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.i }}
          path: out/result-${{ matrix.i }}.txt
          retention-days: 3

  report:
    needs: probe
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: results
          pattern: result-*
          merge-multiple: true
      - name: Aggregate
        run: |
          set -u
          cat results/*.txt 2>/dev/null | sort -t= -k2 -n > all.txt || true
          total=$(wc -l < all.txt | tr -d ' ')
          fails=$(grep -c 'status=FAIL' all.txt || true)
          {
            echo "## get.dune.build network stress — summary"
            echo ""
            echo "**Total probes:** $total  **Fully failed:** $fails"
            echo ""
            echo "### Egress IPs that could NOT connect"
            if [ "$fails" -gt 0 ]; then
              grep 'status=FAIL' all.txt | sed -E 's/.*egress=([^ ]+).*/- \1/' | sort -u
            else
              echo "_none — all probes connected_"
            fi
            echo ""
            echo "### Raw results"
            echo '```'
            cat all.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Total=$total Failed=$fails"
